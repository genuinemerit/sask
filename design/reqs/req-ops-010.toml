id="REQ-OPS-010"
title="Performance measurement and budgets"
category="operational"
priority="should"
statement="The application's performance is measured against stated budgets by a reproducible, deterministic harness in two layers: engine microbenchmarks over the pure hot paths, and end-to-end timings against a live gunicorn server. Interactive pages target under ~500 ms server-side per request; the worst-case ephemeris request (30-day range, 5-minute step, ~8,640 records, either profile) targets under ~3-5 s as a download-shaped request. Budgets are provisional until a local baseline is recorded, and are re-validated on the deployment target. Results are recorded under version control as a regression baseline."
rationale="A lean, single-author deployment means optimising only what is measured to be slow (REQ-OPS-009 deferred any cache to a measured trigger). A reproducible harness over the deterministic engine gives a stable baseline that catches algorithmic regressions cheaply and lets us decide, on evidence, whether the deferred range-query cache is ever warranted."
acceptance=[
  "Engine hot paths, the four interactive endpoints, and the ephemeris endpoint across a defined range/step/profile grid (including the worst case) each yield a recorded timing with median and spread.",
  "Runs are reproducible: fixed inputs, warm-up, and repeats; the deterministic engine gives stable input and output across runs.",
  "Results are written to a versioned location as a baseline later runs can diff against.",
  "A measured breach of the ephemeris budget is the documented trigger for reconsidering the deferred range-query cache; no cache is added without it.",
  "Budgets and the sweep grid are defined in one place the harness reads, not scattered as thresholds across code.",
]
notes="""
Followup note (2026-06-25): a revision to this budget text was once anticipated
in connection with the ephemeris export-time-estimate feature (DD-0015). That
feature was withdrawn 2026-06-25 and will not be pursued, so the anticipated
revision is moot. The existing budget text above is unaffected and stands as
accurate.

Resolution note (2026-07-01): the remote re-validation (REQ-OPS-016/SPEC-025)
against the live droplet measured a genuine worst-case ephemeris-download
budget breach (9.731 s / 8.808 s vs. the 3-5 s budget) - acceptance
criterion #4 above has now been exercised for real, not just designed. Per
DD-0015's rubric, the on-droplet engine timing shows this is raw per-core
compute cost (a uniform ~2-2.6x slowdown vs. the dev host across every hot
path), not redundant/cacheable recompute. Decision: accept-and-document: no
range-query cache added, no droplet resize - the added DigitalOcean spend
for a CPU-Optimized tier isn't justified at this scale. This is the second
time this exact call has been reached; the first pass didn't record it
clearly enough here to stick, which is why this note exists now. Unless the
cost/traffic profile changes, this acceptance criterion is considered
closed - a future breach re-run would need a new decision only if
circumstances materially change. See DD-0015's RESOLVED note and
docs/devlog.md (2026-07-01).
"""
