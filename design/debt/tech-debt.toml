# Technical-debt register — consciously deferred work (decided, not yet done).
# Distinct from port-open-questions.md (undecided) and DDs (decisions).
# Append entries; mark status resolved/wontfix rather than deleting (history).
# Each [[debt]] entry validated against design/debt/_schema.toml.

[[debt]]
id               = "DEBT-0001"
title            = "logs verify CLI command"
status           = "resolved"
raised           = "2026-07-09"
source           = "analysis/tools-ops-vs-cli.md"
area             = "cli"
summary          = """
verify-logging.sh's app-output half (JSON-well-formed + no-secrets check on the
sask log stream) should become a `logs verify` CLI admin command, reusing the
logs query journalctl-wrapping machinery from SPEC-034. It acts on the app's own
log stream (CLI-nature per DD-0021), and unlike the current script would run
against whichever environment the CLI is invoked in (dev journal locally, prod
journal on the droplet) rather than being SSH-only.
"""
trigger          = "Next CLI round, once logs query has proven out in real use."
open_subquestion = """
RESOLVED (SPEC-038): the infra-config half (journald drop-in presence +
SystemMaxUse/MaxRetentionSec caps) became an Ansible post-deploy assertion
(ansible/roles/base/tasks/main.yml, right after the drop-in is templated) so a
deploy fails if the journald config is wrong. With both halves superseded
(app-output -> `logs verify`; infra-config -> the Ansible assertion),
tools/ops/verify-logging.sh was retired.
"""
resolved_by      = "SPEC-038"

