source           = "analysis/tools-ops-vs-cli.md"
area             = "cli"
summary          = """
verify-logging.sh's app-output half (JSON-well-formed + no-secrets check on the
sask log stream) should become a `logs verify` CLI admin command, reusing the
logs query journalctl-wrapping machinery from SPEC-034. It acts on the app's own
