# --- Scholar-description tier (SPEC-036): scene.py's composed night summary ---
# scene.py's render_night_summary()/render_image_prompt() build a variable-
# length list of sentences via conditional branching, list-joining, and
# runtime English pluralization -- decomposed here into whole-sentence
# templates with placeholders (matching the STATEMENT-tier pattern), plus
# reuse of the existing body/star/house/compass/phase tags. get_sky_scene()
# also gained locale-parameterization for BodyInScene.direction/phase,
