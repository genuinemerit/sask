# --- Render-format templates (SPEC-036) ---
# "en" (not "de") before {age}: age values carry their own baked-in article
# ("la Era..."/"el Ahondamiento"), and "en" — unlike "de" — never contracts
# with "el", so both genders render correctly without a de+el->del special case.
"lore.fatunik_solar.format_full" = "{day_name}, el {week_ordinal} {week_word} de {month}, {turn_word} {turn} en {age}"
"lore.terpin_solar.format_full" = "{day_name}, el {week_ordinal} {week_word} de {month}, {turn_word} {turn} en {age}"
"lore.terpin_lunar.format_full" = "{quarter}, día {day} de {month}, {turn_word} {turn} en {age}"
"lore.untamed.format_full" = "{quarter}, día {day} de {month}, {turn_word} {short} del {round_word} {long}"
"lore.warren.format_full" = "{quarter}, día {day} de {month}, {turn_word} {short} del {round_word} {long}"
"lore.hearth.format_full" = "{phase_term}, el {day} día de la vuelta {moon_count} de {moon_word}"
"lore.time.format" = "{watch} Guardia . shur {shur} : keit {keyt}"

