"body.endor.notes" = "Con rotación sincrónica; conocida como «la Vigilante»"
"body.sella.notes" = "Muy regular; favorita de los navegantes"
"body.lelako.notes" = "Pequeña pero brillante; sagrada para los conejos"
"body.jembor.notes" = "Objeto capturado; sin rotación sincrónica; muestra una cara distinta"
"body.calumbra.notes" = "Variación misteriosa de albedo según las estaciones"
"body.zehembra.notes" = "Vinculada a presagios solares y la tradición local del destino; baja inclinación, eclipses frecuentes"
"body.shunna.notes" = "Fría, deslumbrante; se ve mejor durante la Quietud"
"body.kanka.notes" = "Luna capturada con actividad sísmica; a veces «gime» durante las tormentas"
"body.aesthra.notes" = "Heraldo veloz del amanecer o el atardecer; nunca lejos del resplandor de Fatún; muestra fases de creciente a llena con un catalejo. Gemelo interior co-orbital."
"body.lethra.notes" = "Gemelo co-orbital medio ciclo detrás de Aestra; surca el atardecer cuando Aestra surca el amanecer. Los dos heraldos."
"body.beyarus.notes" = "El errante más brillante; un faro bajo nubes densas; fases dramáticas con un catalejo."
"body.dramond.notes" = "Errante ambarino con un disco levemente ovalado y una luna tenue visible con un buen catalejo."
"body.thurnak.notes" = "El errante rojo; notablemente brillante en oposición; de mal agüero en la tradición local."
"body.zelven.notes" = "Gigante de bandas con un cortejo de cuatro lunas brillantes visibles con un catalejo."
"body.kreetha.notes" = "El más lento y distante; el sabio anillado."

"body.kreetha.rings" = "Prominente; aparece como un disco achatado y «orejudo» visto con un catalejo"

