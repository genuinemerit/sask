"star.mirrest.position" = "En el sur-sureste, ardiendo sobre las viejas colinas."
"star.zomel.position" = "Bajo en el suroeste, cerca del velo de nubes."
"star.saurnak.position" = "En el sur, resguardada cerca de la arboleda del farol."
"star.krenna.position" = "En el oeste, cerca del horizonte donde el sol se demora."
"star.ethranel.position" = "En el este-noreste, justo antes del amanecer."
"star.henmae.position" = "En el oeste-suroeste, roja y cerca de la bruma de la cosecha."
"star.aghur.position" = "En el norte-noreste, baja sobre la línea de escarcha."
