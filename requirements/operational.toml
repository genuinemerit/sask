[[requirement]]
id = "REQ-OPS-001"
title = "Reproducible deploy and destroy"
category = "operational"
priority = "must"
statement = "The full droplet provisioning, service deployment, and teardown shall be executable as scripted operations from the developer's local machine."
rationale = "Core experiment goal: dev project as code."
acceptance = [
  "scripts/deploy.sh provisions a droplet and a running service from scratch.",
  "scripts/destroy.sh removes the droplet and all associated cloud resources.",
  "Re-running deploy after destroy yields a working service with no manual steps."
]
[requirement.links]
adrs = ["ADR-0001"]


[[requirement]]
id = "REQ-SEC-001"
title = "No secrets in repo"
category = "security"
priority = "must"
statement = "No secret material (API tokens, private keys, application tokens) shall be committed to the git repository."
rationale = "Standard hygiene; prevents accidental disclosure."
acceptance = [
  ".gitignore covers all known secret paths.",
  "secrets/ directory contains only .example files and README.md.",
  "validate-specs.sh (or pre-commit) flags any committed file matching common secret patterns."
]
[requirement.links]
adrs = ["ADR-0001"]


[[requirement]]
id = "REQ-OPS-002"
title = "Manual droplet access available"
category = "operational"
priority = "should"
statement = "After provisioning, the developer shall be able to access the droplet via SSH (using the project's SSH config snippet) and via DO's browser-based console as a fallback."
rationale = "Recovery and inspection paths are essential when working with cloud resources."
acceptance = [
  "scripts/connect.sh successfully opens an SSH session to the provisioned droplet.",
  "The droplet appears in the DO web UI with a working console option.",
  "SSH access works from a fresh terminal after tofu apply completes."
]
[requirement.links]
adrs = ["ADR-0004"]

[[requirement]]
id = "REQ-OPS-003"
title = "Service runs as systemd unit"
category = "operational"
priority = "must"
statement = "The service shall run as a systemd unit under a non-root user, restart on failure, and start automatically at boot."
rationale = "Reliability and security baseline for any deployed service."
acceptance = [
  "systemctl status sask shows the service active (running).",
  "Killing the service process (pkill -f gunicorn) results in systemd restart within 10 seconds.",
  "Service user (sask) is non-root and has no shell login.",
  "Service files in /opt/sask/ are owned by the sask user."
]
[requirement.links]
adrs = ["ADR-0005"]

[[requirement]]
id = "REQ-OPS-004"
title = "Application tokens deployed from developer machine"
category = "security"
priority = "must"
statement = "The application tokens file shall be deployed from the developer's local machine to the droplet via Ansible. It shall never be committed to git, never pass through Tofu state, and shall be mode 0600 on the droplet."
rationale = "Implements ADR-0001 secrets policy for the application-layer secrets."
acceptance = [
  "Running scripts/deploy.sh without ~/.config/sask/tokens.toml present produces a clear error and exits non-zero.",
  "After deploy, /etc/sask/tokens.toml exists on droplet with mode 0600, owned by sask user.",
  "git grep for any token value returns nothing.",
  "Tofu state does not contain any token value."
]
[requirement.links]
adrs = ["ADR-0001", "ADR-0006"]