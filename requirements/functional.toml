[[requirement]]
id = "REQ-FUN-001"
title = "Resource delivery endpoint"
category = "functional"
priority = "must"
statement = "The service shall deliver a requested resource (image, JSON, or audio) over HTTPS in response to an authenticated request."
rationale = "Core purpose of the project."
acceptance = [
  "GET /resource/<id> with valid token returns 200 and the resource bytes.",
  "GET /resource/<id> with invalid or missing token returns 401.",
  "GET /resource/<unknown-id> with valid token returns 404."
]
[[requirement]]
id = "REQ-FUN-002"
title = "Resource kinds supported"
category = "functional"
priority = "must"
statement = "The service shall support delivery of three resource kinds: image (binary), json (text/UTF-8), and audio (binary)."
rationale = "Defines the initial surface of resource types for game-client consumption."
acceptance = [
  "Service responds correctly to GET /resource/image/<id> with appropriate Content-Type.",
  "Service responds correctly to GET /resource/json/<id> with application/json.",
  "Service responds correctly to GET /resource/audio/<id> with appropriate Content-Type.",
  "Unknown kinds return 404."
]
[requirement.links]
adrs = []
[[requirement]]
id = "REQ-FUN-003"
title = "Service reachable over HTTPS at deployed URL"
category = "functional"
priority = "must"
statement = "The deployed service shall be reachable at https://sask.davidstitt.net/ with a valid Let's Encrypt certificate and shall deliver the same endpoints (and same auth behavior) as the local service."
rationale = "End-to-end functional acceptance criterion for deployment."
acceptance = [
  "curl -s https://sask.davidstitt.net/health returns {\"status\": \"ok\"} with 200.",
  "TLS certificate is valid (curl does not require -k).",
  "All resource kinds (image, json, audio) retrievable with valid token.",
  "All failure conditions from REQ-FUN-001 hold against the remote endpoint (missing token, bad token, unknown id, wrong kind).",
  "Resource bytes retrieved match the local files byte-for-byte."
]
[requirement.links]
adrs = ["ADR-0005"]
