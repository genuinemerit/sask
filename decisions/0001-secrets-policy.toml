id = "ADR-0001"
title = "Secrets handling policy"
status = "accepted"
date = "2026-05-10"

[context]
problem = """
The project will accumulate several categories of secret material: Digital
Ocean API tokens, SSH keys for droplet access, and application-level tokens
that authorize clients of the resource service. A consistent policy is
needed before any code or config is written.
"""
constraints = [
  "Hobby project, single developer, no team coordination overhead.",
  "Must support clean destroy/redeploy cycles.",
  "Must not leak secrets via git history."
]
alternatives = [
  "Commit encrypted secrets (git-crypt, sops). Rejected: too much ceremony for a hobby project.",
  "Vault or similar service. Rejected: out of scope.",
  "Hardcode in Ansible vars. Rejected: violates 'never in repo'."
]

[decision]
summary = """
Two-category secrets policy: infrastructure credentials live in
~/.config/sask/ and are sourced as environment variables; application
tokens live in a local file deployed to the droplet via Ansible. Nothing
secret enters the repo. The repo contains only .example templates and
this policy.
"""
rationale = """
Matches hobby-project ceremony level. Clean separation of concerns
(infra vs app). Compatible with destroy/redeploy. Easy to audit.
"""

[consequences]
positive = [
  "Simple to reason about.",
  "Compatible with multi-machine work (config files travel via secure channel, not git).",
  "Survives a public repo accidentally happening."
]
negative = [
  "Token rotation requires a redeploy unless we later add sqlite-backed token storage.",
  "Onboarding a new dev (unlikely here) requires manual config file setup."
]
followups = [
  "If token rotation matters later, consider sqlite-backed token store as a future ADR."
]

[links]
requirements = ["REQ-SEC-001"]

