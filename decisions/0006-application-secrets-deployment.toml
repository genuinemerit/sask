id = "ADR-0006"
title = "Application secrets deployment"
status = "accepted"
date = "2026-05-13"

[context]
problem = """
The service needs the authorized tokens file (~/.config/sask/tokens.toml
on developer's machine) to be present on the droplet for the service to
authenticate requests. We need a deployment mechanism that respects the
secrets policy from ADR-0001 (never in repo, two-category separation).
"""
constraints = [
  "Tokens file must not enter git history.",
  "Tokens file on droplet must be readable only by the service user.",
  "Deployment must be reproducible — running deploy.sh produces the same correct state.",
  "Local tokens file is the source of truth."
]
alternatives = [
  "Manually scp the tokens file — not reproducible, not part of automation.",
  "Bake tokens into a 'deploy artifact' built locally — same effect, more ceremony.",
  "Sops / git-crypt / vault — out of scope for hobby project."
]

[decision]
summary = """
Ansible copies ~/.config/sask/tokens.toml from the developer's local
machine to /etc/sask/tokens.toml on the droplet during deploy. File is
owned by the 'sask' user with mode 0600. scripts/deploy.sh verifies the
local file exists before invoking Ansible and exits with a helpful
error if not.
"""
rationale = """
Direct copy via Ansible is the simplest workable mechanism. Local file
is the source of truth; droplet file is a deployment artifact. No
encryption at rest — matches the threat model for a hobby project. The
deploy script's existence check catches the most common failure mode
('forgot to create the local tokens file').
"""

[consequences]
positive = [
  "Token changes are deployed by editing the local file and re-running deploy.sh.",
  "Tokens never enter git, never enter Tofu state, never enter logs.",
  "File permissions enforced by Ansible, not by manual setup."
]
negative = [
  "Token rotation requires a full deploy (not just a service reload). Acceptable for hobby scale.",
  "If developer's local tokens.toml is lost, must be regenerated and all clients updated."
]
followups = [
  "If token rotation without full deploy becomes valuable, consider sqlite-backed token store with a CLI tool to add/revoke (per ADR-0001 followup).",
  "If multi-developer scenarios emerge, consider sops or similar encrypted-secrets-in-git pattern."
]

[links]
requirements = ["REQ-SEC-001"]
adrs = ["ADR-0001"]