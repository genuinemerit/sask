id = "ADR-0004"
title = "Deployment topology — single droplet with reserved IP"
status = "accepted"
date = "2026-05-12"

[context]
problem = """
The sask resource service needs a deployment target. We need to choose
the basic shape of cloud resources: how many droplets, what size, what
network setup, what firewall model, and what hostname strategy.
"""
constraints = [
  "Hobby project, low traffic expected.",
  "Must support clean destroy/apply cycles.",
  "Must serve HTTPS to a real game client (Let's Encrypt requires a real domain).",
  "Cost should be minimal."
]
alternatives = [
  "Multi-droplet with load balancer. Rejected: overkill for the scale.",
  "Kubernetes (DOKS). Rejected: massive ceremony for one service.",
  "Serverless (DO Functions). Rejected: doesn't fit the 'classic VM' learning goal.",
  "App Platform (DO's managed PaaS). Rejected: hides the provisioning details we want to learn."
]

[decision]
summary = """
Single Ubuntu 24.04 droplet (s-1vcpu-1gb) in fra1 region. Reserved IP
(DigitalOcean renamed "floating IP" to "reserved IP" in 2022; Tofu
resource: digitalocean_reserved_ip) attached for stable address across
destroy/apply cycles. Cloud-level DO firewall (no ufw on droplet)
allowing inbound SSH (port 22) from the developer's current IP, plus
HTTP (80) and HTTPS (443) from anywhere. Domain sask.davidstitt.net;
DNS managed via Tofu (digitalocean_record resource) — davidstitt.net
is nameservered at DigitalOcean. Root user only on droplet for now;
non-root user creation deferred to PR-004 (Ansible).
"""
rationale = """
Single droplet matches scale; reserved IP enables stable DNS without
reconfiguring after destroy/apply; DO firewall is declarative and part
of the infra-as-code layer (vs ufw which would be a runtime config
concern); fra1 minimizes latency from Spain; Ubuntu 24.04 is current LTS.
"""

[consequences]
positive = [
  "Simple to reason about — one droplet, one IP, one firewall.",
  "DNS record set once, survives destroy/apply cycles.",
  "DO firewall is reviewable via tofu plan before applying.",
  "Recovery via DO web console remains possible (cloud firewall doesn't block console).",
  "DNS record (digitalocean_record) points at the reserved IP, not the droplet — destroy/apply cycles do not require DNS changes."
]
negative = [
  "No HA — droplet failure means service down.",
  "SSH-from-my-IP-only requires re-applying when developer's IP changes (handled via Tofu http data source that fetches current IP at apply time).",
  "Developer IP may change between provisioning sessions (mobile work, ISP IP rotation, VPN toggling). The firewall is set at apply time based on the IP-of-the-moment. If the IP changes after apply, SSH access from the new location requires re-running scripts/provision.sh, which will detect the new IP and update the firewall rule (this is a no-op for everything else and takes seconds).",
  "Reserved IP costs ~$4/month when no droplet is attached. During normal destroy/apply cycles this is brief; if the experiment is paused with the droplet destroyed but the IP retained, costs accumulate."
]
followups = [
  "If the experiment matures, consider: ufw added via Ansible for defense in depth; non-root user creation; backups.",
  "If multi-machine deploys become useful, revisit DNS automation.",
  "If IP-update friction becomes annoying, consider: a dedicated VPN endpoint with a stable IP, or relaxing SSH ingress to 0.0.0.0/0 and relying on key-only auth + fail2ban (acceptable threat model for this project but a step down from current strictness)."
]

[links]
requirements = ["REQ-OPS-001"]
supersedes = ""
