---
# rsync can create at most one missing destination directory level; base's
# role only creates app_root itself, so the src/ parent needs an explicit
# task or the first-ever sync fails trying to create two levels at once.
- name: Ensure the src/ parent directory exists
  ansible.builtin.file:
    path: "{{ app_root }}/src"
    state: directory
    mode: "0755"

# --no-owner --no-group: plain `copy` re-copies __pycache__/.pyc content
# (which varies between identical runs) and rsync's implicit -o/-g flags
# reset ownership — both produce false "changed" on every run otherwise.
- name: Sync the sask package source
  ansible.posix.synchronize:
    src: "{{ repo_root }}/src/sask/"
    dest: "{{ app_root }}/src/sask/"
    delete: true
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=*.pyc"
      - "--no-owner"
      - "--no-group"
  notify: Restart sask service

- name: Sync the config/ data tree
  ansible.posix.synchronize:
    src: "{{ repo_root }}/config/"
    dest: "{{ app_config_dir }}/"
    delete: true
    rsync_opts:
      - "--no-owner"
      - "--no-group"
  notify: Restart sask service

# assets/{{ assets_version }}/ is two levels below app_root (assets/, then
# the version dir) — same rsync one-level limitation as src/ above.
- name: Ensure the assets/ parent directory exists
  ansible.builtin.file:
    path: "{{ app_root }}/assets"
    state: directory
    mode: "0755"

# Notifies the same handler as every other sync task: the service never
# restarts until both the catalog config and its referenced payload files
# are in place together (REQ-OPS-017) — SPEC-026's catalog loader stats
# every entry at create_app() time, so a config-without-files state would
# crash every gunicorn worker, not just asset routes.
- name: Sync the versioned assets/ data tree
  ansible.posix.synchronize:
    src: "{{ repo_root }}/assets/{{ assets_version }}/"
    dest: "{{ app_assets_dir }}/"
    delete: true
    rsync_opts:
      - "--no-owner"
      - "--no-group"
  notify: Restart sask service

# docs/help/ is two levels below app_root (docs/, then help/) — same rsync
# one-level limitation as src/ and assets/ above. Missing until 2026-07-02:
# SPEC-030 built the help feature but explicitly deferred wiring up its
# live deploy; src/sask/help/loader.py and the /help routes were already
# synced (they live under src/sask/), but the Markdown content itself
# never was, so discover_topics() found an empty directory on every
# production droplet — /help rendered the page shell with no topics and
# no intro text, while working fine locally where docs/help/ is just
# there in the checkout.
- name: Ensure the docs/ parent directory exists
  ansible.builtin.file:
    path: "{{ app_root }}/docs"
    state: directory
    mode: "0755"

# Notifies a restart: the app's topic map is built once at create_app()
# time (DD-0018's render_timing), so a new or removed topic file needs a
# restart to be picked up — existing-topic content edits render fresh per
# request and don't need one, but the sync task can't tell those apart.
- name: Sync the docs/help/ content tree
  ansible.posix.synchronize:
    src: "{{ repo_root }}/docs/help/"
    dest: "{{ app_help_dir }}/"
    delete: true
    rsync_opts:
      - "--no-owner"
      - "--no-group"
  notify: Restart sask service

# wsgi.py lives at the repo root, not inside src/sask/, so it needs its own
# explicit task — the rsync above doesn't carry it.
- name: Copy wsgi.py to the app root
  ansible.builtin.copy:
    src: "{{ repo_root }}/wsgi.py"
    dest: "{{ app_root }}/wsgi.py"
    mode: "0644"
  notify: Restart sask service

# The pip module's `requirements:` path must exist on the managed host, not
# the controller — stage it first.
- name: Stage requirements.txt on the remote host
  ansible.builtin.copy:
    src: "{{ repo_root }}/requirements.txt"
    dest: "/tmp/sask-requirements.txt"
    mode: "0644"

- name: Install application dependencies
  ansible.builtin.pip:
    requirements: "/tmp/sask-requirements.txt"
    virtualenv: "{{ venv_dir }}"
  notify: Restart sask service

- name: Stage application secrets (stubbed, unused while auth is deferred)
  ansible.builtin.copy:
    src: "{{ app_secrets_local_example }}"
    dest: "{{ app_secrets_remote }}"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0600"
  no_log: true

- name: Own the app directory tree
  ansible.builtin.file:
    path: "{{ app_root }}"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    recurse: true
