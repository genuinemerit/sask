---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: "{{ apt_cache_valid_time }}"

- name: Upgrade all packages (gated, default off)
  ansible.builtin.apt:
    upgrade: dist
  when: apt_upgrade | bool

- name: Install base packages
  ansible.builtin.apt:
    name:
      - python3-venv
      - python3-pip
      - ca-certificates
      - rsync
      - unattended-upgrades
    state: present

- name: Enable unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: "0644"

- name: Create the app service group
  ansible.builtin.group:
    name: "{{ app_group }}"
    system: true

- name: Create the app service user (no shell login)
  ansible.builtin.user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create the three top-level app directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0750"
  loop:
    - "{{ app_root }}"
    - "{{ etc_dir }}"
    - "{{ log_dir }}"

- name: Harden sshd
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    validate: "/usr/sbin/sshd -t -f %s"
  loop:
    - { regexp: "^#?PermitRootLogin", line: "PermitRootLogin no" }
    - { regexp: "^#?PasswordAuthentication", line: "PasswordAuthentication no" }
    - { regexp: "^#?PubkeyAuthentication", line: "PubkeyAuthentication yes" }
  notify: Restart sshd

# Flush immediately rather than at end-of-play: a later task failing (e.g.
# the app role hitting an unrelated rsync error) must not leave hardening
# written to disk but never actually applied to the running sshd.
- name: Apply sshd hardening immediately
  ansible.builtin.meta: flush_handlers
