---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
  when: apt_upgrade | bool

- name: Install base packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-pip
      - ca-certificates
      - curl
      - gpg
      - apt-transport-https
      - debian-keyring
      - debian-archive-keyring
    state: present

- name: Create sask system user
  ansible.builtin.user:
    name: "{{ sask_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ sask_app_dir }}"
    create_home: false

- name: Create application directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - {path: "{{ sask_app_dir }}", owner: "{{ sask_user }}", group: "{{ sask_group }}", mode: "0755"}
    - {path: "{{ sask_config_dir }}", owner: "{{ sask_user }}", group: "{{ sask_group }}", mode: "0750"}
    - {path: "{{ sask_log_dir }}", owner: "{{ sask_user }}", group: "{{ sask_group }}", mode: "0755"}
