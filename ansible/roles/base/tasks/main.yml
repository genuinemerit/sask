---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: "{{ apt_cache_valid_time }}"

- name: Upgrade all packages (gated, default off)
  ansible.builtin.apt:
    upgrade: dist
  when: apt_upgrade | bool

- name: Install base packages
  ansible.builtin.apt:
    name:
      - python3-venv
      - python3-pip
      - ca-certificates
      - rsync
      - unattended-upgrades
    state: present

- name: Enable unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: "0644"

- name: Create the app service group
  ansible.builtin.group:
    name: "{{ app_group }}"
    system: true

- name: Create the app service user (no shell login)
  ansible.builtin.user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

# DD-0021/SPEC-034: the CLI's `logs query` admin command reads the journal
# on whichever environment it runs in. On the droplet it's run by the admin
# user over SSH, not the (deliberately unprivileged, no journal access)
# app_user — group membership, not sudo, is the least-privilege way to grant
# read access (matches journalctl's own suggested remedy: "Users in groups
# 'adm', 'systemd-journal' can see all messages"). A fresh SSH session is
# required after this first applies for the new group membership to take
# effect (standard Linux group-membership behavior, not sask-specific).
- name: Add the admin user to systemd-journal for passwordless journal reads
  ansible.builtin.user:
    name: "{{ admin_user }}"
    groups: systemd-journal
    append: true

# DD-0021/SPEC-034: separately from journal access, the admin user needs to
# reach app_root (venv + src) at all to invoke the CLI over SSH — app_root
# is 0750 app_user:app_group, not readable by admin_user otherwise. Group
# membership (read+traverse via the group's r-x bits, no write) rather than
# loosening app_root's own mode, so config/secrets/assets stay exactly as
# restricted as before; this only widens WHO can read them, to the one
# already-trusted admin account. Same fresh-session caveat as the
# systemd-journal task above.
- name: Add the admin user to the app group for CLI invocation
  ansible.builtin.user:
    name: "{{ admin_user }}"
    groups: "{{ app_group }}"
    append: true

- name: Create the three top-level app directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0750"
  loop:
    - "{{ app_root }}"
    - "{{ etc_dir }}"
    - "{{ log_dir }}"

- name: Harden sshd
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    validate: "/usr/sbin/sshd -t -f %s"
  loop:
    - { regexp: "^#?PermitRootLogin", line: "PermitRootLogin no" }
    - { regexp: "^#?PasswordAuthentication", line: "PasswordAuthentication no" }
    - { regexp: "^#?PubkeyAuthentication", line: "PubkeyAuthentication yes" }
  notify: Restart sshd

# Flush immediately rather than at end-of-play: a later task failing (e.g.
# the app role hitting an unrelated rsync error) must not leave hardening
# written to disk but never actually applied to the running sshd.
- name: Apply sshd hardening immediately
  ansible.builtin.meta: flush_handlers

# SPEC-032: bound total journal size/age on the 1GB droplet (REQ-OPS-019).
- name: Create the journald drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Template the journald size/retention caps
  ansible.builtin.template:
    src: journald-sask.conf.j2
    dest: /etc/systemd/journald.conf.d/sask.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart journald

# DEBT-0001 infra half (DD-0025): a deploy-time replacement for the retired
# tools/ops/verify-logging.sh's manual drop-in check — a missing/broken cap
# now fails the deploy itself rather than requiring a separate manual script
# run over SSH after the fact.
- name: Read back the journald drop-in for verification
  ansible.builtin.slurp:
    src: /etc/systemd/journald.conf.d/sask.conf
  register: sask_journald_dropin_readback

- name: Assert the journald drop-in carries both size/retention caps
  ansible.builtin.assert:
    that:
      - "'SystemMaxUse=' in (sask_journald_dropin_readback.content | b64decode)"
      - "'MaxRetentionSec=' in (sask_journald_dropin_readback.content | b64decode)"
    fail_msg: >-
      /etc/systemd/journald.conf.d/sask.conf is missing SystemMaxUse=
      and/or MaxRetentionSec= after templating.
    success_msg: "journald drop-in caps verified present"
