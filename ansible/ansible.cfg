[defaults]
inventory = inventory.yml
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto_silent

[ssh_connection]
# Deliberately no ssh_args/-F override: relies on the main ~/.ssh/config's
# `Include ~/.ssh/config.d/*` to resolve the sask-droplet alias. An explicit
# `-F ~/.ssh/config.d/sask` here would silently fail — `~` isn't
# shell-expanded when Ansible invokes the ssh subprocess directly.
pipelining = True
