[defaults]
inventory          = inventory.yml
roles_path         = roles
host_key_checking  = False
retry_files_enabled = False
# Gathering smart: re-uses cached facts per host within the same run.
gathering          = smart

[ssh_connection]
# The sask-droplet alias is defined in ~/.ssh/config.d/sask (written by tofu
# apply) and picked up via the Include directive in ~/.ssh/config.  No -F
# override needed; Ansible uses the default SSH config resolution.
