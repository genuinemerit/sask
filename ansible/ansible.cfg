[defaults]
inventory          = inventory.yml
roles_path         = roles
host_key_checking  = False
retry_files_enabled = False
# Gathering smart: re-uses cached facts per host within the same run.
gathering          = smart

[ssh_connection]
# Use the SSH config snippet generated by tofu apply, which defines the
# sask-droplet alias with the current reserved IP.
ssh_args = -F ~/.ssh/config.d/sask
